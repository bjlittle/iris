# reference:
#   - https://github.com/actions/cache
#   - https://github.com/actions/checkout
#   - https://github.com/marketplace/actions/setup-miniconda

name: ci-tests 

on:
  push:
    branches:
      - "*" 
  pull_request:
    branches:
      - "*" 

jobs:
  tests:
    name: ${{ matrix.os }} ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash -l {0}
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest"]
        python-version: ["3.8"]

    steps:
      - name: "Setup environment"
        env:
          # Maximum cache period (in weeks) before forcing a cache refresh.
          CACHE_PERIOD: 2
        run: |
          echo "CACHE_PERIOD=$(date +%Y).$(expr $(date +%U) / ${CACHE_PERIOD})" >> ${GITHUB_ENV}

      - name: "Cartopy cache"
        uses: actions/cache@v2
        id: cartopy_cache
        env:
          # Increment the build number to force a cache refresh.
          CACHE_BUILD: 0
        with:
          path: ~/.local/share/cartopy
          key: ${{ runner.os }}-cartopy-p${{ env.CACHE_PERIOD }}-b${{ env.CACHE_BUILD }}

      - name: "Cartopy download"
        if: steps.cartopy_cache.outputs.cache-hit != 'true'
        env:
          CARTOPY_SHARE_DIR: ~/.local/share/cartopy
          CARTOPY_FEATURE: https://raw.githubusercontent.com/SciTools/cartopy/v0.20.0/tools/cartopy_feature_download.py
        run: |
          pip list
          python -m pip install --retries 3 --upgrade cartopy
          pip list
          wget --quiet ${CARTOPY_FEATURE}
          mkdir -p ${CARTOPY_SHARE_DIR}
          python cartopy_feature_download.py physical --output ${CARTOPY_SHARE_DIR} --no-warn 
          tree ${CARTOPY_SHARE_DIR} 
